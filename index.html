<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손수건 신청 관리</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; font-size: 15px; }
  .app { max-width: 900px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; }

  /* 연결 상태 */
  #conn-status { font-size: 13px; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
  .conn-ok { background: #d1fae5; color: #065f46; }
  .conn-no { background: #fee2e2; color: #991b1b; }

  /* 차수 탭 */
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .tab-btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; background: #bfdbfe; color: #1e3a8a; }
  .tab-btn.active { background: #2563eb; color: #fff; }
  .tab-del { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 16px; padding: 0 2px; }
  .btn-add-round { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; background: #22c55e; color: #fff; }
  .btn-undo { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; background: #e5e7eb; color: #374151; }
  .btn-undo:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 카드 */
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 16px; margin-bottom: 16px; }

  /* 요약 */
  .summary { display: flex; gap: 16px; flex-wrap: wrap; background: #f9fafb; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; font-size: 14px; }
  .summary b { font-weight: 600; }
  .summary .unpaid { color: #dc2626; }

  /* 잠금 배너 */
  .lock-banner { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 10px 14px; font-weight: 600; margin-bottom: 12px; font-size: 14px; }

  /* 메타 */
  .meta-box { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
  .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .meta-row label { font-size: 14px; color: #6b7280; }
  .meta-row input[type="text"], .meta-row input[type="number"] { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; width: 130px; }
  .meta-row input:disabled { background: #f3f4f6; color: #9ca3af; }
  .check-label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
  .check-label input { width: 16px; height: 16px; cursor: pointer; }

  /* 필터 + 추가 버튼 */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; background: #bfdbfe; color: #1e3a8a; font-weight: 500; }
  .filter-btn.active { background: #2563eb; color: #fff; }
  .btn-add-row { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; background: #22c55e; color: #fff; }
  .btn-add-row:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f3f4f6; padding: 8px 6px; text-align: center; border: 1px solid #e5e7eb; font-weight: 500; white-space: nowrap; }
  td { padding: 5px 6px; text-align: center; border: 1px solid #e5e7eb; }
  tr.row-unpaid { background: #fff1f2; }
  tr.row-paid-confirm { background: #f0fdf4; }
  td input[type="text"], td input[type="number"] { width: 100%; padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; text-align: center; }
  td input[type="text"]:disabled, td input[type="number"]:disabled { background: #f9fafb; color: #9ca3af; border-color: #e5e7eb; }
  td input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .btn-del-row { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 14px; padding: 2px 8px; }
  .btn-del-row:disabled { opacity: 0.3; cursor: not-allowed; }

  /* 로딩 */
  #loading { text-align: center; padding: 40px; color: #6b7280; font-size: 15px; }

  @media (max-width: 600px) {
    th, td { font-size: 13px; padding: 4px 3px; }
    td input[type="text"], td input[type="number"] { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>손수건 신청 관리</h1>
  <div id="conn-status" class="conn-no">● 연결 중...</div>
  <div id="loading">데이터 불러오는 중...</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXLoJD6n61LsbcTBSqG3tKzbJ4DsSbWzo",
  authDomain: "handkerchief-app.firebaseapp.com",
  databaseURL: "https://handkerchief-app-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "handkerchief-app",
  storageBucket: "handkerchief-app.firebasestorage.app",
  messagingSenderId: "204229484386",
  appId: "1:204229484386:web:590f020d3528d63987163b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("handkerchief");

let rounds = [];
let activeIndex = 0;
let filter = "all";
let history = [];
let isRemoteUpdate = false;

const connStatus = document.getElementById("conn-status");
const loadingEl = document.getElementById("loading");
const mainEl = document.getElementById("main");

db.ref(".info/connected").on("value", snap => {
  if (snap.val()) {
    connStatus.textContent = "● 실시간 연결됨";
    connStatus.className = "conn-ok";
  } else {
    connStatus.textContent = "● 연결 끊김";
    connStatus.className = "conn-no";
  }
});

ref.on("value", snap => {
  const val = snap.val();
  isRemoteUpdate = true;
  if (val) {
    // Firebase는 배열을 객체로 반환하므로 변환 필요
    const arr = Array.isArray(val) ? val : Object.values(val);
    rounds = arr.map(r => ({
      ...r,
      data: r.data ? (Array.isArray(r.data) ? r.data : Object.values(r.data)) : []
    }));
    if (activeIndex >= rounds.length) activeIndex = 0;
  } else {
    rounds = [{ name: "1차", meta: { orderer: "", orderDone: false, shippingDone: false, pricePer100: "" }, data: [] }];
    save();
  }
  loadingEl.style.display = "none";
  mainEl.style.display = "block";
  render();
  isRemoteUpdate = false;
}, err => {
  console.error("Firebase 오류:", err);
  loadingEl.textContent = "데이터 로드 실패: " + err.message;
});

function save() {
  ref.set(rounds);
}

function saveHistory() {
  history = [...history.slice(-9), JSON.parse(JSON.stringify(rounds))];
}

function undo() {
  if (!history.length) return;
  rounds = JSON.parse(JSON.stringify(history[history.length - 1]));
  history = history.slice(0, -1);
  activeIndex = 0;
  save();
}

function fmt(n) { return Number(n || 0).toLocaleString(); }

function calcPrice(qty) {
  const price = Number(rounds[activeIndex].meta.pricePer100 || 0);
  return (price * Number(qty || 0)) / 100;
}

function addRound() {
  saveHistory();
  const copied = JSON.parse(JSON.stringify(rounds[activeIndex]));
  copied.name = `${rounds.length + 1}차`;
  rounds.push(copied);
  activeIndex = rounds.length - 1;
  save();
}

function deleteRound(idx) {
  if (rounds.length === 1) return;
  if (!confirm(`${rounds[idx].name}을 삭제할까요?`)) return;
  saveHistory();
  rounds.splice(idx, 1);
  activeIndex = 0;
  save();
}

function addRow() {
  if (rounds[activeIndex].meta.orderDone) return;
  saveHistory();
  rounds[activeIndex].data.push({ name: "", quantity: "", paid: false, paidConfirm: false, received: false });
  save();
}

function deleteRow(i) {
  if (rounds[activeIndex].meta.orderDone) return;
  saveHistory();
  rounds[activeIndex].data.splice(i, 1);
  save();
}

function updateField(i, field, value) {
  const locked = rounds[activeIndex].meta.orderDone;
  if (locked && field !== "received" && field !== "paid" && field !== "paidConfirm") return;
  rounds[activeIndex].data[i][field] = value;
  save();
}

function updateMeta(field, value) {
  rounds[activeIndex].meta[field] = value;
  save();
}

function getFilteredData() {
  return rounds[activeIndex].data.map((row, i) => ({ ...row, _i: i })).filter(row => {
    if (filter === "unpaid") return !row.paid;
    if (filter === "unreceived") return !row.received;
    return true;
  });
}

function render() {
  const round = rounds[activeIndex];
  const locked = round.meta.orderDone;
  const data = round.data || [];
  const totalQty = data.reduce((s, r) => s + Number(r.quantity || 0), 0);
  const totalPrice = data.reduce((s, r) => s + calcPrice(r.quantity), 0);
  const unpaidTotal = data.filter(r => !r.paid).reduce((s, r) => s + calcPrice(r.quantity), 0);
  const filtered = getFilteredData();

  mainEl.innerHTML = `
    <div class="tabs">
      ${rounds.map((r, i) => `
        <div style="display:flex;align-items:center;gap:3px">
          <button class="tab-btn ${i === activeIndex ? 'active' : ''}" onclick="setActive(${i})">${r.name}</button>
          <button class="tab-del" onclick="deleteRound(${i})">✕</button>
        </div>
      `).join("")}
      <button class="btn-add-round" onclick="addRound()">+ 차수 추가</button>
      <button class="btn-undo" onclick="undo()" ${!history.length ? "disabled" : ""}>되돌리기</button>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <span style="font-size:17px;font-weight:600">${round.name} 신청 현황</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:14px;color:#6b7280">100장당 금액</span>
          <input type="text" style="width:110px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px"
            value="${fmt(round.meta.pricePer100)}"
            oninput="handlePriceInput(this)"
            onchange="handlePriceChange(this)" />
        </div>
      </div>

      <div class="summary">
        <div>총 수량: <b>${fmt(totalQty)}</b></div>
        <div>총 금액: <b>${fmt(totalPrice)}</b></div>
        <div>미입금: <b class="unpaid">${fmt(unpaidTotal)}</b></div>
      </div>

      ${locked ? `<div class="lock-banner">이번 차수 신청이 완료되었습니다.</div>` : ""}

      <div class="meta-box">
        <div class="meta-row">
          <label>주문자</label>
          <input type="text" maxlength="10" ${locked ? "disabled" : ""}
            value="${round.meta.orderer || ""}"
            onchange="updateMeta('orderer', this.value)" />
        </div>
        <div class="meta-row">
          <label class="check-label">
            <input type="checkbox" ${round.meta.orderDone ? "checked" : ""}
              onchange="updateMeta('orderDone', this.checked)"> 주문완료
          </label>
          <label class="check-label">
            <input type="checkbox" ${round.meta.shippingDone ? "checked" : ""}
              onchange="updateMeta('shippingDone', this.checked)"> 배송완료
          </label>
        </div>
      </div>

      <div class="toolbar">
        <div class="filter-btns">
          <button class="filter-btn ${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">전체</button>
          <button class="filter-btn ${filter === 'unpaid' ? 'active' : ''}" onclick="setFilter('unpaid')">미입금 🔍</button>
          <button class="filter-btn ${filter === 'unreceived' ? 'active' : ''}" onclick="setFilter('unreceived')">미수령 🔍</button>
        </div>
        <button class="btn-add-row" onclick="addRow()" ${locked ? "disabled" : ""}>+ 추가</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:18%">이름</th>
              <th style="width:12%">수량</th>
              <th style="width:13%">신청금액</th>
              <th style="width:9%">입금</th>
              <th style="width:9%">입금확인</th>
              <th style="width:9%">수령</th>
              <th style="width:8%">삭제</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0
              ? `<tr><td colspan="7" style="padding:20px;color:#9ca3af">데이터가 없습니다</td></tr>`
              : filtered.map(row => {
                  const i = row._i;
                  const cls = !row.paid ? "row-unpaid" : row.paidConfirm ? "row-paid-confirm" : "";
                  return `
                    <tr class="${cls}">
                      <td><input type="text" value="${row.name || ""}" ${locked ? "disabled" : ""}
                        onchange="updateField(${i}, 'name', this.value)"></td>
                      <td><input type="number" value="${row.quantity || ""}" ${locked ? "disabled" : ""}
                        onchange="updateField(${i}, 'quantity', this.value)" style="width:70px"></td>
                      <td>${fmt(calcPrice(row.quantity))}</td>
                      <td><input type="checkbox" ${row.paid ? "checked" : ""}
                        onchange="updateField(${i}, 'paid', this.checked)"></td>
                      <td><input type="checkbox" ${row.paidConfirm ? "checked" : ""}
                        onchange="updateField(${i}, 'paidConfirm', this.checked)"></td>
                      <td><input type="checkbox" ${row.received ? "checked" : ""}
                        onchange="updateField(${i}, 'received', this.checked)"></td>
                      <td><button class="btn-del-row" onclick="deleteRow(${i})" ${locked ? "disabled" : ""}>삭제</button></td>
                    </tr>`;
                }).join("")
            }
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function setActive(i) { activeIndex = i; render(); }
function setFilter(f) { filter = f; render(); }

function handlePriceInput(el) {
  const raw = el.value.replace(/,/g, "");
  if (isNaN(raw)) return;
  rounds[activeIndex].meta.pricePer100 = raw;
  render();
}
function handlePriceChange(el) {
  const raw = el.value.replace(/,/g, "");
  if (isNaN(raw)) return;
  updateMeta("pricePer100", raw);
}
</script>
</body>
</html>
